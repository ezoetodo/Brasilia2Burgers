<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasilia 2 - Hamburguesas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
            margin: 0;
        }

        /* Pantalla de presentación automática */
        #welcome-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease-out, visibility 1s;
        }

        .welcome-text {
            font-size: 3.5rem;
            font-weight: 800;
            color: white;
            text-shadow: 2px 4px 12px rgba(0,0,0,0.3);
            animation: pulse 1.5s infinite ease-in-out;
            text-align: center;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.9; }
        }

        .fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* Card de Hamburguesa */
        .burger-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .burger-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: #1e293b;
        }

        /* Animación para el precio flotante */
        @keyframes floatBadge {
            0% { transform: rotate(3deg) translateY(0px); }
            50% { transform: rotate(-2deg) translateY(-10px); }
            100% { transform: rotate(3deg) translateY(0px); }
        }

        .price-badge {
            animation: floatBadge 3s infinite ease-in-out;
        }

        /* Checkboxes */
        .option-checkbox {
            appearance: none;
            width: 28px;
            height: 28px;
            border: 2px solid #f59e0b;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }

        .option-checkbox:checked {
            background-color: #f59e0b;
            transform: scale(1.1);
        }

        .option-checkbox:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-weight: bold;
            left: 6px;
            top: 0px;
        }

        /* Efecto de Emojis flotantes */
        .floating-emoji {
            position: absolute;
            font-size: 3.5rem;
            pointer-events: none;
            animation: floatUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 50;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5) rotate(20deg); opacity: 0; }
        }

        .btn-order {
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }

        .badge-delivery {
            background-color: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.4);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Pantalla de Bienvenida -->
    <div id="welcome-screen">
        <h1 class="welcome-text">¡Buen provecho!</h1>
        <div class="mt-6 flex gap-2">
            <span class="w-3 h-3 bg-white rounded-full animate-bounce"></span>
            <span class="w-3 h-3 bg-white rounded-full animate-bounce [animation-delay:0.2s]"></span>
            <span class="w-3 h-3 bg-white rounded-full animate-bounce [animation-delay:0.4s]"></span>
        </div>
    </div>

    <!-- Contenido Principal -->
    <main class="max-w-md mx-auto px-5 pt-10 pb-24 opacity-0 transition-opacity duration-1000" id="main-content">
        
        <header class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500">
                Brasilia 2 Burgers
            </h2>
            <div class="mt-2 inline-flex items-center gap-2 px-4 py-1 rounded-full badge-delivery text-xs font-bold uppercase tracking-wider">
                <span>🛵 Entrega gratis en el conjunto</span>
            </div>
        </header>

        <!-- Card Principal -->
        <div class="burger-card p-5 rounded-[2.5rem] shadow-2xl overflow-hidden" id="card-container">
            <div class="relative">
                <img id="main-burger-img" src="hamburguesa1.jpg" alt="[Image of Mi Hamburguesa]" class="burger-image mb-6">
                
                <div class="price-badge absolute bottom-10 right-4 bg-amber-500 text-white font-black px-4 py-2 rounded-2xl shadow-lg">
                    $3.00
                </div>
            </div>
            
            <div class="mb-4">
                <h3 class="text-2xl font-bold">La Especial</h3>
                <p class="text-gray-400 text-sm leading-relaxed mt-1">
                    Carne artesanal, queso fundido y vegetales frescos. Directo a tu casa en Brasilia 2.
                </p>
            </div>

            <!-- Opciones con Efectos -->
            <div class="space-y-3">
                <p class="text-xs font-bold text-amber-500 uppercase tracking-widest ml-1 text-center">Personaliza tu sabor</p>
                
                <label class="flex items-center justify-between p-4 rounded-2xl bg-white/5 border border-white/10 cursor-pointer active:scale-95 transition">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" class="option-checkbox" id="extra-huevo" onchange="handleOptionChange(this, '🍳')">
                        <span class="font-medium">Huevo Frito</span>
                    </div>
                    <span class="text-amber-400 font-bold">+$1.00</span>
                </label>

                <label class="flex items-center justify-between p-4 rounded-2xl bg-white/5 border border-white/10 cursor-pointer active:scale-95 transition">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" class="option-checkbox" id="extra-combo" onchange="handleOptionChange(this, '🍟🥤')">
                        <span class="font-medium">Papas y Cola</span>
                    </div>
                    <span class="text-amber-400 font-bold">+$1.00</span>
                </label>
            </div>

            <!-- Datos de Entrega -->
            <div class="mt-8 space-y-3">
                <input type="text" id="casa" placeholder="Número de Casa (Ej: 45)" class="w-full bg-white/10 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-amber-500 transition placeholder:text-gray-500">
                <input type="text" id="nombre" placeholder="Tu Nombre" class="w-full bg-white/10 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-amber-500 transition placeholder:text-gray-500">
            </div>

            <!-- Total y Pedido -->
            <div class="mt-10">
                <div class="flex justify-between items-end mb-6 px-2">
                    <span class="text-gray-400 text-sm">Total del pedido</span>
                    <span class="text-4xl font-black text-white" id="total-display">$3.00</span>
                </div>
                
                <button onclick="sendOrder()" class="btn-order w-full py-5 rounded-2xl font-black text-white text-lg flex justify-center items-center gap-3 transition hover:brightness-110 active:scale-95">
                    HACER PEDIDO
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.025 3.129l-.694 2.482 2.541-.67c.819.514 1.748.814 2.896.815h.003c3.181 0 5.767-2.586 5.768-5.766 0-3.18-2.586-5.766-5.767-5.766zm3.366 8.283c-.141.397-.714.733-1.018.778-.276.04-.636.069-1.025-.058-.232-.076-.521-.18-.895-.345-1.583-.7-2.593-2.292-2.671-2.396-.079-.104-.633-.84-.633-1.602 0-.761.397-1.135.538-1.291.141-.155.308-.194.411-.194.103 0 .205.001.294.006.095.005.223-.036.35.269.141.341.482 1.173.523 1.259.041.085.068.185.011.299-.057.114-.085.185-.17.284-.085.101-.178.224-.253.3-.089.09-.181.189-.077.368.103.179.46.759.986 1.23.678.605 1.25.793 1.428.882.179.089.284.074.39-.047.106-.121.455-.53.576-.711.121-.181.242-.152.409-.091.168.061 1.066.503 1.251.594.185.091.308.136.353.213.045.078.045.452-.096.849z"/></svg>
                </button>
            </div>
        </div>

        <p class="mt-8 text-center text-gray-600 text-[10px] uppercase tracking-widest font-bold">
            Exclusivo Brasilia 2
        </p>

    </main>

    <script>
        const BASE_PRICE = 3.0;
        let total = BASE_PRICE;

        // Intentar arreglar extensión de imagen automáticamente
        window.addEventListener('load', () => {
            const img = document.getElementById('main-burger-img');
            
            img.onerror = function() {
                if (this.src.endsWith('.jpg')) {
                    this.src = 'hamburguesa1.jpeg';
                }
            };

            setTimeout(() => {
                const welcome = document.getElementById('welcome-screen');
                welcome.classList.add('fade-out');
                document.getElementById('main-content').classList.remove('opacity-0');
                setTimeout(() => welcome.style.display = 'none', 1000);
            }, 2500);
        });

        function handleOptionChange(checkbox, emoji) {
            updateTotal();
            if (checkbox.checked) {
                createFloatingEmoji(emoji);
            }
        }

        function createFloatingEmoji(emoji) {
            const container = document.getElementById('card-container');
            const el = document.createElement('div');
            el.className = 'floating-emoji';
            el.innerText = emoji;
            el.style.left = '50%';
            el.style.marginLeft = '-1.75rem';
            el.style.top = '40%';
            container.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function updateTotal() {
            let currentTotal = BASE_PRICE;
            if (document.getElementById('extra-huevo').checked) currentTotal += 1.0;
            if (document.getElementById('extra-combo').checked) currentTotal += 1.0;
            
            total = currentTotal;
            const display = document.getElementById('total-display');
            display.innerText = `$${total.toFixed(2)}`;
            
            display.animate([
                { transform: 'scale(1)', color: '#fff' },
                { transform: 'scale(1.3)', color: '#fbbf24' },
                { transform: 'scale(1)', color: '#fff' }
            ], { duration: 300 });
        }

        function sendOrder() {
            const casa = document.getElementById('casa').value.trim();
            const nombre = document.getElementById('nombre').value.trim();
            
            if (!casa || !nombre) {
                alert("Por favor completa tu nombre y número de casa.");
                return;
            }

            const huevo = document.getElementById('extra-huevo').checked ? "✅ Con Huevo Frito 🍳" : "❌ Sin Huevo";
            const combo = document.getElementById('extra-combo').checked ? "✅ Con Papas y Cola 🍟🥤" : "❌ Solo Hamburguesa";

            const message = `*NUEVO PEDIDO - BRASILIA 2*%0A%0A` +
                            `*Cliente:* ${nombre}%0A` +
                            `*Casa:* ${casa}%0A` +
                            `--------------------------%0A` +
                            `*Producto:* 1 Hamburguesa Especial 🍔%0A` +
                            `*Extras:*%0A` +
                            `- ${huevo}%0A` +
                            `- ${combo}%0A` +
                            `--------------------------%0A` +
                            `*TOTAL:* $${total.toFixed(2)}%0A` +
                            `*Envío:* GRATIS%0A%0A` +
                            `¡Gracias!`;

            const myNumber = "593939406913"; 
            window.location.href = `https://wa.me/${myNumber}?text=${message}`;
        }
    </script>
</body>
</html>
